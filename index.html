<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Phill's Admin</title>
<meta name="theme-color" content="#faf9f5" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<link rel="manifest" href="manifest.json" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
:root{--bg:#0f0f1a;--surface:#1a1a2e;--card:#22223b;--border:#2d2d4e;--accent:#7c6af7;--accent2:#f7c948;--success:#4ade80;--danger:#f87171;--text:#e8e8f0;--muted:#8888aa;--header-bg:#1a1a2e;--input-bg:#0f0f1a;--shadow:rgba(0,0,0,0.4);--module-color:#7c6af7;--module-light:rgba(124,106,247,0.12);--font:'Inter',sans-serif;--mono:'JetBrains Mono',monospace;--radius:12px;--radius-sm:6px;--carried:#fb923c;}
[data-theme="light"]{--bg:#f5f4f0;--surface:#ffffff;--card:#ffffff;--border:#e0ddd8;--accent:#5b4fe0;--accent2:#c49a00;--success:#16a34a;--danger:#dc2626;--text:#1a1a2a;--muted:#7a7a8a;--header-bg:#ffffff;--input-bg:#f5f4f0;--shadow:rgba(0,0,0,0.08);--module-color:#5b4fe0;--module-light:rgba(91,79,224,0.08);}
[data-theme="rainbow"]{--bg:#fef9f5;--surface:#ffffff;--card:#ffffff;--border:#ecddd0;--accent:#7060d0;--accent2:#c08000;--success:#2d8a2d;--danger:#c04040;--text:#2a1a0a;--muted:#8a7060;--header-bg:#ffffff;--input-bg:#fef9f5;--shadow:rgba(80,40,0,0.08);--module-color:#7060d0;--module-light:rgba(112,96,208,0.1);}
[data-theme="spectrum"]{--bg:#f8f7ff;--surface:#ffffff;--card:#ffffff;--border:#dddaf8;--accent:#5050b0;--accent2:#b08000;--success:#2d7a2d;--danger:#b04040;--text:#1a1a3a;--muted:#7070a0;--header-bg:#ffffff;--input-bg:#f8f7ff;--shadow:rgba(0,0,60,0.08);--module-color:#5050b0;--module-light:rgba(80,80,176,0.1);}
[data-theme="spectrum"][data-module="home"]{--module-color:#5050b0;--module-light:rgba(80,80,176,0.1);--header-bg:#e8e8ff;}
[data-theme="spectrum"][data-module="todo"]{--module-color:#5050b0;--module-light:rgba(80,80,176,0.1);--header-bg:#e8e8ff;}
[data-theme="spectrum"][data-module="birthdays"]{--module-color:#b04080;--module-light:rgba(176,64,128,0.1);--header-bg:#ffe8f4;}
[data-theme="spectrum"][data-module="statements"]{--module-color:#2d7a2d;--module-light:rgba(45,122,45,0.1);--header-bg:#e0f8e0;}
[data-theme="spectrum"][data-module="journal"]{--module-color:#7050b0;--module-light:rgba(112,80,176,0.1);--header-bg:#f0e8ff;}
[data-theme="spectrum"][data-module="watchlist"]{--module-color:#3070a8;--module-light:rgba(48,112,168,0.1);--header-bg:#dceeff;}
[data-theme="spectrum"][data-module="weight"]{--module-color:#a06030;--module-light:rgba(160,96,48,0.1);--header-bg:#ffeedd;}
[data-theme="spectrum"][data-module="shopping"]{--module-color:#b04040;--module-light:rgba(176,64,64,0.1);--header-bg:#ffe8e8;}
[data-theme="spectrum"][data-module="settings"]{--module-color:#5050b0;--module-light:rgba(80,80,176,0.1);--header-bg:#e8e8ff;}
[data-theme="rainbow"][data-module="home"]{--header-bg:#f0eeff;}
[data-theme="rainbow"][data-module="todo"]{--module-color:#7060d0;--module-light:rgba(112,96,208,0.1);--header-bg:#f0eeff;}
[data-theme="rainbow"][data-module="birthdays"]{--module-color:#c04080;--module-light:rgba(192,64,128,0.1);--header-bg:#ffe8f2;}
[data-theme="rainbow"][data-module="statements"]{--module-color:#208060;--module-light:rgba(32,128,96,0.1);--header-bg:#e0f8f0;}
[data-theme="rainbow"][data-module="journal"]{--module-color:#8050c0;--module-light:rgba(128,80,192,0.1);--header-bg:#f4e8ff;}
[data-theme="rainbow"][data-module="watchlist"]{--module-color:#2060b0;--module-light:rgba(32,96,176,0.1);--header-bg:#ddeeff;}
[data-theme="rainbow"][data-module="weight"]{--module-color:#b06020;--module-light:rgba(176,96,32,0.1);--header-bg:#fff0dd;}
[data-theme="rainbow"][data-module="shopping"]{--module-color:#b03030;--module-light:rgba(176,48,48,0.1);--header-bg:#ffe8e8;}
[data-theme="rainbow"][data-module="settings"]{--header-bg:#f0eeff;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{height:100%;}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100dvh;display:flex;flex-direction:column;transition:background 0.3s,color 0.3s;}
#auth-screen{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:100dvh;padding:2rem;gap:1.5rem;text-align:center;}
#auth-screen.visible{display:flex;}
#auth-screen h1{font-size:2rem;font-weight:600;letter-spacing:-0.03em;}
#auth-screen p{color:var(--muted);max-width:280px;line-height:1.6;}
.auth-btn{background:var(--accent);color:#fff;border:none;padding:0.875rem 2rem;border-radius:var(--radius);font-size:1rem;font-family:var(--font);font-weight:500;cursor:pointer;}
.logo-mark{width:72px;height:72px;background:var(--accent);border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:2.2rem;}
#bio-screen{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:100dvh;padding:2rem;gap:1.5rem;text-align:center;}
#bio-screen.visible{display:flex;}
#bio-screen h2{font-size:1.5rem;font-weight:600;}
#bio-screen p{color:var(--muted);max-width:260px;line-height:1.6;}
.bio-icon{font-size:3rem;}
.bio-btn{background:var(--accent);color:#fff;border:none;padding:0.875rem 2rem;border-radius:var(--radius);font-size:1rem;font-family:var(--font);font-weight:500;cursor:pointer;}
.bio-skip{background:none;border:none;color:var(--muted);font-size:0.85rem;font-family:var(--font);cursor:pointer;text-decoration:underline;}
#app{display:none;flex-direction:column;min-height:100dvh;}
#app.visible{display:flex;}
header{background:var(--header-bg);border-bottom:1px solid var(--border);padding:0.75rem 1rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;transition:background 0.3s;}
.header-left{display:flex;align-items:center;gap:0.6rem;}
.hamburger{background:none;border:none;color:var(--text);font-size:1.3rem;cursor:pointer;padding:0.2rem;line-height:1;}
header h1{font-size:1.05rem;font-weight:600;letter-spacing:-0.02em;color:var(--module-color);}
main{flex:1;overflow-y:auto;padding:1rem;}
.menu-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;}
.menu-overlay.open{display:block;}
.side-menu{position:fixed;top:0;left:-280px;width:280px;height:100dvh;background:var(--surface);border-right:1px solid var(--border);z-index:201;transition:left 0.25s ease;display:flex;flex-direction:column;overflow-y:auto;}
.side-menu.open{left:0;}
.menu-header{padding:1.25rem 1rem 0.75rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.menu-header h2{font-size:1rem;font-weight:600;color:var(--module-color);}
.menu-close{background:none;border:none;color:var(--muted);font-size:1.3rem;cursor:pointer;}
.menu-item{display:flex;align-items:center;gap:0.75rem;padding:0.75rem 1rem;cursor:pointer;transition:background 0.12s;border:none;background:none;width:100%;text-align:left;font-family:var(--font);font-size:0.9rem;color:var(--text);}
.menu-item:hover{background:var(--module-light);}
.menu-item.active{color:var(--module-color);font-weight:500;background:var(--module-light);}
.menu-item-icon{font-size:1.1rem;width:24px;text-align:center;}
.menu-section{font-size:0.65rem;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);padding:0.75rem 1rem 0.25rem;}
.menu-divider{height:1px;background:var(--border);margin:0.25rem 0;}
.section-title{font-size:0.68rem;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin:1.25rem 0 0.6rem;}
.section-title:first-child{margin-top:0;}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:0.875rem 1rem;margin-bottom:0.5rem;}
.add-input{background:var(--input-bg);border:1px solid var(--border);color:var(--text);padding:0.6rem 0.75rem;border-radius:var(--radius-sm);font-size:0.9rem;font-family:var(--font);outline:none;width:100%;}
.add-input:focus{border-color:var(--module-color);}
.add-row{display:flex;gap:0.5rem;margin-top:0.75rem;}
.add-btn{background:var(--module-color);border:none;color:#fff;padding:0.6rem 1rem;border-radius:var(--radius-sm);font-family:var(--font);font-size:0.88rem;cursor:pointer;white-space:nowrap;}
.add-btn.secondary{background:var(--card);border:1px solid var(--border);color:var(--text);}
.add-btn.danger{background:var(--danger);}
.del-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:1rem;padding:0.25rem;line-height:1;}
.del-btn:hover{color:var(--danger);}
.empty-state{text-align:center;color:var(--muted);padding:2rem 1rem;font-size:0.88rem;line-height:1.6;}
.pill{font-size:0.65rem;padding:0.15rem 0.5rem;border-radius:99px;font-weight:500;}
select.mini{background:var(--input-bg);border:1px solid var(--border);color:var(--text);padding:0.3rem 0.4rem;border-radius:var(--radius-sm);font-family:var(--font);font-size:0.78rem;outline:none;}
.home-greeting{font-size:1.3rem;font-weight:600;letter-spacing:-0.02em;margin-bottom:0.25rem;}
.home-date{font-size:0.8rem;color:var(--muted);margin-bottom:1.25rem;}
.home-grid{display:grid;grid-template-columns:1fr 1fr;gap:0.75rem;}
.home-tile{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:0.875rem;cursor:pointer;position:relative;overflow:hidden;}
.home-tile-icon{font-size:1.4rem;margin-bottom:0.4rem;}
.home-tile-name{font-size:0.7rem;font-weight:600;letter-spacing:0.05em;text-transform:uppercase;color:var(--muted);margin-bottom:0.2rem;}
.home-tile-summary{font-size:0.8rem;color:var(--text);line-height:1.4;}
.home-tile-accent{position:absolute;top:0;left:0;width:3px;height:100%;}
.home-tile[data-nav="todo"] .home-tile-accent{background:#7060d0;}
.home-tile[data-nav="projects"] .home-tile-accent{background:#0891b2;}
.home-tile[data-nav="birthdays"] .home-tile-accent{background:#c04080;}
.home-tile[data-nav="statements"] .home-tile-accent{background:#208060;}
.home-tile[data-nav="journal"] .home-tile-accent{background:#8050c0;}
.home-tile[data-nav="watchlist"] .home-tile-accent{background:#2060b0;}
.home-tile[data-nav="weight"] .home-tile-accent{background:#b06020;}
.home-tile[data-nav="shopping"] .home-tile-accent{background:#b03030;}
.bucket-tabs{display:flex;gap:0.4rem;margin-bottom:1rem;}
.bucket-tab{flex:1;background:var(--card);border:1px solid var(--border);color:var(--muted);padding:0.5rem;border-radius:var(--radius-sm);font-size:0.78rem;font-family:var(--font);cursor:pointer;text-align:center;}
.bucket-tab.active{background:var(--module-color);border-color:var(--module-color);color:#fff;}
.task-item{display:flex;align-items:flex-start;gap:0.7rem;padding:0.65rem 0;border-bottom:1px solid var(--border);}
.task-item:last-of-type{border-bottom:none;}
.task-check{width:20px;height:20px;border-radius:50%;border:2px solid var(--border);background:none;cursor:pointer;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;font-size:0.7rem;font-weight:700;}
.task-check.done{background:var(--success);border-color:var(--success);color:#000;}
.task-body{flex:1;min-width:0;}
.task-text{font-size:0.88rem;line-height:1.4;word-break:break-word;}
.task-text.done{text-decoration:line-through;color:var(--muted);}
.carried-badge{font-size:0.62rem;background:rgba(251,146,60,0.22);color:var(--carried);border:1px solid rgba(251,146,60,0.5);padding:0.1rem 0.45rem;border-radius:99px;margin-left:0.4rem;vertical-align:middle;font-weight:600;}
.recurring-badge{font-size:0.62rem;background:var(--module-light);color:var(--module-color);border:1px solid var(--border);padding:0.1rem 0.4rem;border-radius:99px;margin-left:0.4rem;vertical-align:middle;}
.project-badge{font-size:0.62rem;background:rgba(8,145,178,0.15);color:#0891b2;border:1px solid rgba(8,145,178,0.3);padding:0.1rem 0.4rem;border-radius:99px;margin-left:0.4rem;vertical-align:middle;}
.eod-btn{width:100%;margin-top:0.75rem;background:rgba(247,201,72,0.1);border:1px solid rgba(247,201,72,0.3);color:var(--accent2);padding:0.65rem;border-radius:var(--radius-sm);font-family:var(--font);font-size:0.85rem;cursor:pointer;}
.recurring-opts{display:flex;align-items:center;gap:0.5rem;margin-top:0.5rem;flex-wrap:wrap;}
.recurring-opts label{font-size:0.78rem;color:var(--muted);display:flex;align-items:center;gap:0.3rem;}
.opts-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:1.1rem;padding:0.25rem 0.4rem;line-height:1;}
.opts-btn:hover{color:var(--module-color);}
.opts-menu{display:none;position:absolute;background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);box-shadow:0 4px 16px var(--shadow);z-index:150;overflow:hidden;min-width:110px;}
.opts-menu.open{display:block;}
.opts-menu button{display:block;width:100%;text-align:left;background:none;border:none;color:var(--text);padding:0.6rem 0.9rem;font-family:var(--font);font-size:0.85rem;cursor:pointer;}
.opts-menu button:hover{background:var(--module-light);}
.opts-menu button.danger-opt{color:var(--danger);}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:300;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem;width:calc(100% - 2rem);max-width:380px;}
.modal h3{font-size:1rem;font-weight:600;margin-bottom:1rem;}
.modal-btns{display:flex;gap:0.5rem;margin-top:1rem;justify-content:flex-end;}
.birthday-item{display:flex;align-items:center;gap:0.75rem;padding:0.7rem 0;border-bottom:1px solid var(--border);}
.birthday-item:last-child{border-bottom:none;padding-bottom:0;}
.b-avatar{width:38px;height:38px;border-radius:50%;background:var(--module-color);display:flex;align-items:center;justify-content:center;font-weight:600;font-size:0.85rem;color:#fff;flex-shrink:0;}
.b-info{flex:1;}
.b-name{font-size:0.88rem;font-weight:500;}
.b-date{font-size:0.73rem;color:var(--muted);margin-top:0.1rem;}
.days-pill.soon{background:rgba(247,201,72,0.15);color:var(--accent2);}
.days-pill.today{background:rgba(74,222,128,0.15);color:var(--success);}
.days-pill.later{background:var(--surface);color:var(--muted);border:1px solid var(--border);}
.stmt-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;}
.stmt-table{border-collapse:collapse;width:100%;min-width:340px;font-size:0.78rem;}
.stmt-table th{text-align:left;padding:0.45rem 0.55rem;color:var(--muted);font-weight:500;font-size:0.68rem;border-bottom:1px solid var(--border);white-space:nowrap;}
.stmt-table td{padding:0.45rem 0.55rem;border-bottom:1px solid var(--border);vertical-align:middle;}
.stmt-table tr:last-child td{border-bottom:none;}
.stmt-acct{font-weight:500;font-size:0.82rem;}
.stmt-day{color:var(--muted);font-size:0.72rem;font-family:var(--mono);}
.stmt-cell{text-align:center;width:48px;}
.stmt-tick{width:26px;height:26px;border-radius:6px;border:1.5px solid var(--border);background:none;cursor:pointer;margin:auto;display:flex;align-items:center;justify-content:center;font-size:0.78rem;}
.stmt-tick.checked{background:var(--success);border-color:var(--success);color:#000;}
.stmt-tick.due:not(.checked){border-color:var(--accent2);box-shadow:0 0 0 2px rgba(247,201,72,0.25);}
.due-banner{background:rgba(247,201,72,0.1);border:1px solid rgba(247,201,72,0.3);border-radius:var(--radius);padding:0.7rem 0.9rem;margin-bottom:1rem;}
.due-banner-title{font-size:0.72rem;color:var(--accent2);font-weight:600;margin-bottom:0.3rem;}
.journal-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1rem;margin-bottom:1rem;}
.journal-prompt{font-size:0.8rem;color:var(--module-color);font-style:italic;margin-bottom:0.6rem;line-height:1.5;}
.journal-editor{width:100%;min-height:90px;background:none;border:none;color:var(--text);font-family:var(--font);font-size:0.88rem;line-height:1.8;outline:none;white-space:pre-wrap;word-break:break-word;}
.journal-editor:empty::before{content:attr(data-placeholder);color:var(--muted);}
.journal-line{display:flex;align-items:baseline;gap:0.5rem;}
.j-dot{display:inline-block;width:9px;height:9px;border-radius:50%;flex-shrink:0;margin-right:0.55rem;}
.journal-footer{display:flex;justify-content:space-between;align-items:center;margin-top:0.6rem;}
.past-entry{padding:0.6rem 0;border-bottom:1px solid var(--border);cursor:pointer;}
.past-entry:last-child{border-bottom:none;}
.past-date{font-size:0.68rem;color:var(--muted);font-family:var(--mono);margin-bottom:0.4rem;}
.past-line{display:flex;align-items:baseline;margin-bottom:0.3rem;font-size:0.84rem;line-height:1.5;}
.add-past-form{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:0.75rem 1rem;margin-bottom:1rem;}
.watch-filters{display:flex;gap:0.4rem;margin-bottom:1rem;flex-wrap:wrap;}
.watch-filter{background:var(--card);border:1px solid var(--border);color:var(--muted);padding:0.3rem 0.7rem;border-radius:99px;font-size:0.76rem;font-family:var(--font);cursor:pointer;}
.watch-filter.active{background:var(--module-color);border-color:var(--module-color);color:#fff;}
.watch-item{display:flex;align-items:center;gap:0.65rem;padding:0.65rem 0;border-bottom:1px solid var(--border);}
.watch-item:last-child{border-bottom:none;}
.watch-type-badge{font-size:0.62rem;padding:0.12rem 0.4rem;border-radius:99px;font-weight:500;flex-shrink:0;}
.watch-type-badge.film{background:var(--module-light);color:var(--module-color);}
.watch-type-badge.tv{background:rgba(247,201,72,0.15);color:var(--accent2);}
.watch-title{flex:1;font-size:0.88rem;}
.watch-title.watched{text-decoration:line-through;color:var(--muted);}
.watch-check{width:22px;height:22px;border-radius:50%;border:2px solid var(--border);background:none;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:0.72rem;}
.watch-check.watched{background:var(--success);border-color:var(--success);color:#000;}
.weight-hero{text-align:center;padding:1rem 0 0.5rem;}
.weight-latest-val{font-size:2.5rem;font-family:var(--mono);font-weight:500;color:var(--module-color);letter-spacing:-0.03em;line-height:1;}
.weight-latest-lbl{font-size:0.73rem;color:var(--muted);margin-top:0.2rem;}
.weight-stats{display:flex;gap:0.6rem;margin:0.75rem 0;}
.weight-stat{flex:1;background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:0.65rem;text-align:center;}
.weight-stat-val{font-size:1rem;font-family:var(--mono);font-weight:500;}
.weight-stat-lbl{font-size:0.62rem;color:var(--muted);margin-top:0.15rem;}
.weight-num{width:90px;background:var(--input-bg);border:1px solid var(--border);color:var(--text);padding:0.55rem 0.5rem;border-radius:var(--radius-sm);font-size:0.95rem;font-family:var(--mono);outline:none;text-align:center;}
.weight-log-row{display:flex;align-items:center;gap:0.5rem;flex-wrap:wrap;}
.weight-unit{color:var(--muted);font-size:0.85rem;}
canvas{width:100%!important;}
.shop-item{display:flex;align-items:center;gap:0.7rem;padding:0.65rem 0;border-bottom:1px solid var(--border);}
.shop-item:last-of-type{border-bottom:none;}
.shop-check{width:22px;height:22px;border-radius:4px;border:2px solid var(--border);background:none;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:0.72rem;}
.shop-check.done{background:var(--success);border-color:var(--success);color:#000;}
.shop-text{flex:1;font-size:0.88rem;}
.shop-text.done{text-decoration:line-through;color:var(--muted);}
.clear-btn{width:100%;margin-top:0.75rem;background:none;border:1px solid var(--border);color:var(--muted);padding:0.6rem;border-radius:var(--radius-sm);font-family:var(--font);font-size:0.82rem;cursor:pointer;}
.clear-btn:hover{border-color:var(--danger);color:var(--danger);}
.settings-row{display:flex;align-items:center;justify-content:space-between;padding:0.85rem 0;border-bottom:1px solid var(--border);}
.settings-row:last-child{border-bottom:none;}
.settings-label{font-size:0.88rem;}
.settings-sub{font-size:0.72rem;color:var(--muted);margin-top:0.15rem;}
.switch{position:relative;width:44px;height:24px;background:var(--border);border-radius:99px;cursor:pointer;border:none;flex-shrink:0;}
.switch.on{background:var(--module-color);}
.switch-dot{position:absolute;top:2px;left:2px;width:20px;height:20px;background:#fff;border-radius:50%;transition:transform 0.15s;}
.switch.on .switch-dot{transform:translateX(20px);}
.theme-swatches{display:grid;grid-template-columns:repeat(4,1fr);gap:0.5rem;margin-top:0.5rem;}
.theme-swatch{border:2px solid var(--border);border-radius:8px;padding:0.5rem 0.3rem;cursor:pointer;text-align:center;background:var(--surface);}
.theme-swatch.active{border-color:var(--module-color);}
.theme-swatch-dot{width:28px;height:28px;border-radius:50%;margin:0 auto 0.3rem;}
.theme-swatch-label{font-size:0.65rem;color:var(--muted);}
.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);background:var(--card);border:1px solid var(--border);color:var(--text);padding:0.55rem 1.2rem;border-radius:99px;font-size:0.82rem;opacity:0;transition:opacity 0.2s;pointer-events:none;z-index:400;white-space:nowrap;box-shadow:0 4px 16px var(--shadow);}
.toast.show{opacity:1;}
select option{background:var(--card);}
input[type="checkbox"]{accent-color:var(--module-color);}
input[type="date"]{color-scheme:dark;}
[data-theme="light"] input[type="date"],[data-theme="rainbow"] input[type="date"],[data-theme="spectrum"] input[type="date"]{color-scheme:light;}
.pr-shortcuts{display:flex;gap:0.5rem;margin-bottom:0.75rem;flex-wrap:wrap;}
.pr-shortcut-btn{background:var(--card);border:1px solid var(--border);color:var(--text);padding:0.45rem 0.8rem;border-radius:var(--radius-sm);font-size:0.78rem;font-family:var(--font);cursor:pointer;}
.pr-shortcut-btn:hover{border-color:var(--module-color);}
.pr-crumbs{display:flex;flex-wrap:wrap;gap:0.25rem;font-size:0.76rem;color:var(--muted);margin-bottom:0.75rem;}
.pr-crumb{cursor:pointer;color:var(--module-color);}
.pr-crumb:hover{text-decoration:underline;}
.pr-folder-row{display:flex;align-items:center;gap:0.6rem;padding:0.6rem 0;border-bottom:1px solid var(--border);cursor:pointer;}
.pr-folder-row:last-child{border-bottom:none;}
.pr-folder-icon{font-size:1.1rem;}
.pr-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:0.4rem;margin-top:0.5rem;}
.pr-thumb{position:relative;aspect-ratio:1;background:var(--surface);border-radius:var(--radius-sm);overflow:hidden;cursor:pointer;border:1px solid var(--border);}
.pr-thumb img{width:100%;height:100%;object-fit:cover;display:block;}
.pr-need-thumb{width:100%;height:100%;}
.pr-thumb-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:1.3rem;}
.pr-vid-badge{position:absolute;bottom:3px;right:3px;background:rgba(0,0,0,0.65);color:#fff;font-size:0.6rem;padding:0.1rem 0.35rem;border-radius:4px;}
.pr-viewer{display:flex;flex-direction:column;gap:0.6rem;}
.pr-viewer-stage{background:#000;border-radius:var(--radius);overflow:hidden;display:flex;align-items:center;justify-content:center;min-height:220px;position:relative;}
.pr-load-overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0.6rem;background:rgba(0,0,0,0.5);color:#fff;text-align:center;padding:1rem;}
.pr-play-btn{width:56px;height:56px;border-radius:50%;background:rgba(255,255,255,0.9);border:none;font-size:1.4rem;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.pr-viewer-controls{display:flex;justify-content:space-between;align-items:center;gap:0.4rem;}
.pr-nav-btn{background:var(--card);border:1px solid var(--border);color:var(--text);width:38px;height:38px;border-radius:50%;cursor:pointer;font-size:1rem;flex-shrink:0;}
.pr-nav-btn:disabled{opacity:0.3;}
.pr-action-row{display:flex;gap:0.5rem;flex:1;justify-content:center;flex-wrap:wrap;}
.pr-filmstrip{display:flex;gap:0.4rem;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:0.3rem;}
.pr-film-thumb{flex-shrink:0;width:56px;height:56px;border-radius:6px;overflow:hidden;border:2px solid transparent;cursor:pointer;background:var(--surface);}
.pr-film-thumb.active{border-color:var(--module-color);}
.pr-film-thumb img{width:100%;height:100%;object-fit:cover;display:block;}
.pr-compare-wrap{display:flex;gap:0.4rem;}
.pr-compare-wrap.stacked{flex-direction:column;}
.pr-compare-pane{flex:1;background:#000;border-radius:var(--radius-sm);overflow:hidden;display:flex;align-items:center;justify-content:center;min-height:140px;}
.pr-compare-pane img{max-width:100%;max-height:45vh;display:block;}
.pr-rejected-item{display:flex;align-items:center;gap:0.6rem;padding:0.6rem 0;border-bottom:1px solid var(--border);}
.pr-rejected-item:last-child{border-bottom:none;}
.pr-rejected-name{font-size:0.82rem;word-break:break-word;}
.pr-rejected-path{font-size:0.68rem;color:var(--muted);margin-top:0.1rem;word-break:break-word;}
.home-tile[data-nav="photoreview"] .home-tile-accent{background:#0d9488;}
.pr-debug-banner{background:rgba(248,113,113,0.1);border:1px solid rgba(248,113,113,0.35);border-radius:var(--radius);padding:0.75rem 0.9rem;margin-bottom:0.75rem;font-size:0.78rem;line-height:1.5;color:var(--text);word-break:break-word;}
.pr-debug-actions{display:flex;gap:0.5rem;margin-top:0.5rem;}
</style>
</head>
<body>
<div id="auth-screen">
<div class="logo-mark">📋</div>
<h1>Phill's Admin</h1>
<p>Connect to Dropbox to load your data and keep everything backed up automatically.</p>
<button class="auth-btn" onclick="startDropboxAuth()">Connect Dropbox</button>
</div>
<div id="bio-screen">
<div class="bio-icon">👆</div>
<h2>Unlock</h2>
<p>Use your fingerprint to access Phill's Admin.</p>
<button class="bio-btn" onclick="doBiometric()">Use Fingerprint</button>
<button class="bio-skip" onclick="bioSkip()">Skip for now</button>
</div>
<div id="app">
<header>
<div class="header-left">
<button class="hamburger" onclick="toggleMenu()">☰</button>
<h1 id="page-title">Phill's Admin</h1>
</div>
</header>
<main id="main-content"></main>
</div>
<div class="menu-overlay" id="menu-overlay" onclick="closeMenu()"></div>
<div class="side-menu" id="side-menu">
<div class="menu-header"><h2>📋 Phill's Admin</h2><button class="menu-close" onclick="closeMenu()">✕</button></div>
<div class="menu-section">Modules</div>
<button class="menu-item" onclick="navTo('home')"><span class="menu-item-icon">🏠</span>Home</button>
<button class="menu-item" onclick="navTo('todo')"><span class="menu-item-icon">✅</span>To Do</button>
<button class="menu-item" onclick="navTo('shopping')"><span class="menu-item-icon">🛒</span>Shopping</button>
<button class="menu-item" onclick="navTo('birthdays')"><span class="menu-item-icon">🎂</span>Birthdays</button>
<button class="menu-item" onclick="navTo('statements')"><span class="menu-item-icon">🏦</span>Statements</button>
<button class="menu-item" onclick="navTo('journal')"><span class="menu-item-icon">✨</span>Journal</button>
<button class="menu-item" onclick="navTo('watchlist')"><span class="menu-item-icon">🎬</span>Watch list</button>
<button class="menu-item" onclick="navTo('weight')"><span class="menu-item-icon">⚖️</span>Weight</button>
<button class="menu-item" onclick="navTo('photoreview')"><span class="menu-item-icon">📷</span>Photo Review</button>
<div class="menu-divider"></div>
<button class="menu-item" onclick="navTo('settings')"><span class="menu-item-icon">⚙️</span>Settings</button>
</div>
<div class="modal-overlay" id="edit-modal">
<div class="modal">
<h3 id="edit-modal-title">Edit task</h3>
<input class="add-input" id="edit-task-input" placeholder="Task text…" />
<div class="modal-btns">
<button class="add-btn secondary" onclick="closeEditModal()">Cancel</button>
<button class="add-btn" onclick="saveEditTask()">Save</button>
</div>
</div>
</div>
<div class="toast" id="toast"></div>
<script>
const DROPBOX_APP_KEY='kg70xibrafahre2';
const REDIRECT_URI='https://philltowns.github.io/PhillsAdmin/';
const DATA_FILE='/PhillsAdmin/data.json';
const RAINBOW_COLORS=['#c084fc','#818cf8','#60a5fa','#34d399','#a3e635','#fbbf24','#fb923c','#f472b6','#e879f9','#38bdf8','#4ade80','#facc15'];

let data={
  tasks:[],birthdays:[],
  statements:{accounts:[],months:{}},
  journal:[],watchlist:[],
  weight:{entries:[],target:null,heightCm:null},
  shopping:[],
  photoReview:{rejected:[]},
  settings:{journalBoundaryHour:0,bioEnabled:false}
};
let accessToken=null,currentTab='home',currentBucket='today';
let currentWatchFilter='all',weightChart=null;
let editingTaskId=null,editingEntryDate=null,longPressTimer=null;
let prState={path:null,entries:[],loading:false,view:'browse',openIdx:-1,compareSel:[],thumbCache:{},fullUrl:null,debugMsg:null};

function el(id){return document.getElementById(id);}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2);}
function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function realToday(){return new Date().toISOString().slice(0,10);}
function todayStr(){
  const bh=data.settings.journalBoundaryHour||0;const now=new Date();
  if(bh>0&&now.getHours()<bh){const d=new Date(now);d.setDate(d.getDate()-1);return d.toISOString().slice(0,10);}
  return now.toISOString().slice(0,10);
}
function fmtDate(iso){return new Date(iso+'T12:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});}
function ordinal(n){const s=['th','st','nd','rd'],v=n%100;return n+(s[(v-20)%10]||s[v]||s[0]);}
function greeting(){const h=new Date().getHours();return h<12?'morning':h<17?'afternoon':'evening';}
function showToast(msg){const t=el('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}

// DROPBOX
function startDropboxAuth(){
  const state=Math.random().toString(36).slice(2);
  localStorage.setItem('dbx_state',state);
  window.location.href=`https://www.dropbox.com/oauth2/authorize?client_id=${DROPBOX_APP_KEY}&response_type=token&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&state=${state}`;
}
function handleOAuthCallback(){
  const params=new URLSearchParams(window.location.hash.substring(1));
  const token=params.get('access_token');
  if(token){localStorage.setItem('dbx_token',token);window.history.replaceState({},'',window.location.pathname);return token;}
  return null;
}
async function loadFromDropbox(){
  try{
    const res=await fetch('https://content.dropboxapi.com/2/files/download',{method:'POST',headers:{'Authorization':`Bearer ${accessToken}`,'Dropbox-API-Arg':JSON.stringify({path:DATA_FILE})}});
    if(res.status===409){await saveToDropbox();return;}
    const json=await res.json();
    ['tasks','birthdays','journal','watchlist','shopping'].forEach(k=>{if(json[k])data[k]=json[k];});
    if(json.statements)data.statements=json.statements;
    if(json.weight)data.weight={...data.weight,...json.weight};
    if(json.photoReview)data.photoReview=json.photoReview;
    if(json.settings)data.settings={...data.settings,...json.settings};
    localStorage.setItem('dbx_cache',JSON.stringify(data));
  }catch(e){
    const c=localStorage.getItem('dbx_cache');
    if(c)try{data=JSON.parse(c);}catch(e2){}
    showToast('Offline — using cached data');
  }
}
async function saveToDropbox(){
  try{
    await fetch('https://content.dropboxapi.com/2/files/upload',{method:'POST',headers:{'Authorization':`Bearer ${accessToken}`,'Dropbox-API-Arg':JSON.stringify({path:DATA_FILE,mode:'overwrite',autorename:false}),'Content-Type':'application/octet-stream'},body:new Blob([JSON.stringify(data,null,2)],{type:'application/json'})});
    localStorage.setItem('dbx_cache',JSON.stringify(data));
  }catch(e){showToast('Save failed — check connection');}
}
async function syncDropbox(){await loadFromDropbox();renderTab();showToast('Synced ✓');}

// BIOMETRIC
async function enableBiometric(){
  if(!window.PublicKeyCredential){showToast('Not supported on this device/browser');return;}
  try{
    const challenge=new Uint8Array(32);crypto.getRandomValues(challenge);
    const cred=await navigator.credentials.create({publicKey:{challenge,rp:{name:"PhillsAdmin"},user:{id:new Uint8Array(16),name:"phill",displayName:"Phill"},pubKeyCredParams:[{type:"public-key",alg:-7}],authenticatorSelection:{authenticatorAttachment:"platform",userVerification:"required"},timeout:60000}});
    if(cred){data.settings.bioEnabled=true;localStorage.setItem('bio_enabled','1');saveToDropbox();showToast('Fingerprint lock enabled ✓');renderSettings();}
  }catch(e){showToast('Could not enable — try again');}
}
function disableBiometric(){
  data.settings.bioEnabled=false;localStorage.removeItem('bio_enabled');saveToDropbox();showToast('Fingerprint lock disabled');renderSettings();
}
async function doBiometric(){
  try{
    const challenge=new Uint8Array(32);crypto.getRandomValues(challenge);
    await navigator.credentials.get({publicKey:{challenge,userVerification:"required",timeout:60000,allowCredentials:[]}});
    showApp();
  }catch(e){showApp();}
}
function bioSkip(){showApp();}

// MENU
function toggleMenu(){el('side-menu').classList.toggle('open');el('menu-overlay').classList.toggle('open');}
function closeMenu(){el('side-menu').classList.remove('open');el('menu-overlay').classList.remove('open');}
function navTo(tab){closeMenu();showTab(tab);}

// THEME
function setTheme(t){
  document.documentElement.setAttribute('data-theme',t);
  localStorage.setItem('theme',t);
  setModuleAttr(currentTab);
  if(currentTab==='settings')renderSettings();
}
function setModuleAttr(tab){document.documentElement.setAttribute('data-module',tab);}

// TABS
const tabTitles={home:"Phill's Admin",todo:'To Do',birthdays:'Birthdays',statements:'Statements',journal:'Journal',watchlist:'Watch list',weight:'Weight',shopping:'Shopping',photoreview:'Photo Review',settings:'Settings'};
const tabIcons={home:'🏠',todo:'✅',birthdays:'🎂',statements:'🏦',journal:'✨',watchlist:'🎬',weight:'⚖️',shopping:'🛒',photoreview:'📷',settings:'⚙️'};
function showTab(tab){
  currentTab=tab;setModuleAttr(tab);
  document.querySelectorAll('.menu-item').forEach(b=>b.classList.remove('active'));
  const a=document.querySelector(`.menu-item[onclick="navTo('${tab}')"]`);if(a)a.classList.add('active');
  el('page-title').textContent=(tabIcons[tab]||'')+' '+(tabTitles[tab]||tab);
  renderTab();
}
function renderTab(){
  closeAllOptsMenus();
  if(currentTab==='home')renderHome();
  else if(currentTab==='todo')renderTodo();
  else if(currentTab==='birthdays')renderBirthdays();
  else if(currentTab==='statements')renderStatements();
  else if(currentTab==='journal')renderJournal();
  else if(currentTab==='watchlist')renderWatchlist();
  else if(currentTab==='weight')renderWeight();
  else if(currentTab==='shopping')renderShopping();
  else if(currentTab==='photoreview')renderPhotoReviewTab();
  else if(currentTab==='settings')renderSettings();
}

// HOME
function renderHome(){
  const mc=el('main-content');
  const now=new Date();
  const dayName=now.toLocaleDateString('en-GB',{weekday:'long'});
  const dateLabel=now.toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'});
  const todayTasks=data.tasks.filter(t=>t.bucket==='today');
  const doneTasks=todayTasks.filter(t=>t.done).length;
  const dueBdays=data.birthdays.filter(b=>daysUntil(b.mmdd)<=28);
  const nowYM=realToday().slice(0,7);
  const dueStmts=data.statements.accounts.filter(a=>isStmtDue(a,nowYM)&&!data.statements.months[`${a.id}_${nowYM}`]);
  const latestW=[...data.weight.entries].sort((a,b)=>b.date.localeCompare(a.date))[0];
  const unwatched=data.watchlist.filter(w=>!w.watched).length;
  const shopLeft=data.shopping.filter(s=>!s.done).length;
  mc.innerHTML=`
<div class="home-greeting">Good ${greeting()}, Phill</div>
<div class="home-date">${dayName}, ${dateLabel}</div>
<div class="home-grid">
<div class="home-tile" onclick="showTab('todo')" data-nav="todo"><div class="home-tile-accent"></div><div class="home-tile-icon">✅</div><div class="home-tile-name">To Do</div><div class="home-tile-summary">${todayTasks.length===0?'No tasks today':`${doneTasks}/${todayTasks.length} done today`}</div></div>
<div class="home-tile" onclick="showTab('shopping')" data-nav="shopping"><div class="home-tile-accent"></div><div class="home-tile-icon">🛒</div><div class="home-tile-name">Shopping</div><div class="home-tile-summary">${shopLeft===0?'List is clear':`${shopLeft} item${shopLeft!==1?'s':''} to get`}</div></div>
<div class="home-tile" onclick="showTab('birthdays')" data-nav="birthdays"><div class="home-tile-accent"></div><div class="home-tile-icon">🎂</div><div class="home-tile-name">Birthdays</div><div class="home-tile-summary">${dueBdays.length===0?'None in 4 weeks':`${dueBdays.length} in next 4 weeks`}</div></div>
<div class="home-tile" onclick="showTab('statements')" data-nav="statements"><div class="home-tile-accent"></div><div class="home-tile-icon">🏦</div><div class="home-tile-name">Statements</div><div class="home-tile-summary">${dueStmts.length===0?'All up to date':`${dueStmts.length} to check`}</div></div>
<div class="home-tile" onclick="showTab('journal')" data-nav="journal"><div class="home-tile-accent"></div><div class="home-tile-icon">✨</div><div class="home-tile-name">Journal</div><div class="home-tile-summary">${data.journal.find(e=>e.date===todayStr())?'Entry logged today':'Nothing logged yet today'}</div></div>
<div class="home-tile" onclick="showTab('watchlist')" data-nav="watchlist"><div class="home-tile-accent"></div><div class="home-tile-icon">🎬</div><div class="home-tile-name">Watch list</div><div class="home-tile-summary">${unwatched===0?'All watched':`${unwatched} to watch`}</div></div>
<div class="home-tile" onclick="showTab('weight')" data-nav="weight" style="grid-column:span 2"><div class="home-tile-accent"></div><div class="home-tile-icon">⚖️</div><div class="home-tile-name">Weight</div><div class="home-tile-summary">${latestW?`Last: ${latestW.kg} kg on ${fmtDate(latestW.date)}`:'No entries yet'}</div></div>
<div class="home-tile" onclick="showTab('photoreview')" data-nav="photoreview" style="grid-column:span 2"><div class="home-tile-accent"></div><div class="home-tile-icon">📷</div><div class="home-tile-name">Photo Review</div><div class="home-tile-summary">${data.photoReview.rejected.length?`${data.photoReview.rejected.length} in review folder`:'Browse & review photos'}</div></div>
</div>`;
}

// TO DO
function closeAllOptsMenus(){document.querySelectorAll('.opts-menu').forEach(m=>m.classList.remove('open'));}
function toggleOptsMenu(id,ev){
  ev.stopPropagation();
  const menu=el('opts-'+id);
  const wasOpen=menu.classList.contains('open');
  closeAllOptsMenus();
  if(!wasOpen)menu.classList.add('open');
}
document.addEventListener('click',()=>closeAllOptsMenus());

function renderTodo(){
  const mc=el('main-content');
  const items=data.tasks.filter(t=>t.bucket===currentBucket);
  mc.innerHTML=`
<div class="bucket-tabs">${['today','soon','someday'].map(b=>`<button class="bucket-tab${currentBucket===b?' active':''}" onclick="setBucket('${b}')">${b.charAt(0).toUpperCase()+b.slice(1)}</button>`).join('')}</div>
<div class="card">
${items.length===0?`<div class="empty-state">Nothing here — add a task below.</div>`:''}
${items.map(t=>`
<div class="task-item" style="position:relative">
<button class="task-check${t.done?' done':''}" onclick="toggleTask('${t.id}')">${t.done?'✓':''}</button>
<div class="task-body">
<span class="task-text${t.done?' done':''}">${escHtml(t.text)}</span>${t.carried?`<span class="carried-badge">carried</span>`:''} ${t.recurring?`<span class="recurring-badge">${t.recurringFreq||'recurring'}</span>`:''}
</div>
<button class="opts-btn" onclick="toggleOptsMenu('${t.id}',event)">⋮</button>
<div class="opts-menu" id="opts-${t.id}" style="right:0;top:1.8rem">
<button onclick="openEditModal('${t.id}')">✏️ Edit</button>
<button class="danger-opt" onclick="deleteTask('${t.id}')">🗑 Delete</button>
</div>
</div>`).join('')}
<div class="add-row">
<input class="add-input" id="task-input" placeholder="Add a task…" style="flex:1" onkeydown="if(event.key==='Enter')addTask()" />
<button class="add-btn" onclick="addTask()">Add</button>
</div>
${currentBucket==='today'?`
<div class="recurring-opts">
<label><input type="checkbox" id="task-recur"> Recurring</label>
<select class="mini" id="task-freq"><option value="daily">Daily</option><option value="weekly">Weekly</option><option value="monthly">Monthly</option></select>
</div>`:''}
</div>
${currentBucket==='today'?`<button class="eod-btn" onclick="endOfDay()">🌙 End of day — carry incomplete tasks forward</button>`:''}
<p style="font-size:0.72rem;color:var(--muted);text-align:center;margin-top:0.5rem">${items.filter(t=>t.done).length} of ${items.length} done</p>`;
}
function setBucket(b){currentBucket=b;renderTodo();}
function addTask(){
  const inp=el('task-input');const text=inp.value.trim();if(!text)return;
  const recurEl=el('task-recur');
  const recurring=currentBucket==='today'&&recurEl?recurEl.checked:false;
  data.tasks.push({id:uid(),text,bucket:currentBucket,done:false,recurring,recurringFreq:recurring?el('task-freq').value:null,carried:false,created:realToday()});
  inp.value='';saveToDropbox();renderTodo();
}
function toggleTask(id){
  const t=data.tasks.find(x=>x.id===id);if(!t)return;
  if(t.done&&t.recurring)t.done=false;else t.done=!t.done;

// BIRTHDAYS
function daysUntil(mmdd){
  const now=new Date();const[m,d]=mmdd.split('-').map(Number);
  let next=new Date(now.getFullYear(),m-1,d);
  if(next<now)next=new Date(now.getFullYear()+1,m-1,d);
  return Math.ceil((next-now)/86400000);
}
function calcAge(year,mmdd){
  if(!year)return null;
  const now=new Date();const[m,d]=mmdd.split('-').map(Number);
  let age=now.getFullYear()-year;
  if(now<new Date(now.getFullYear(),m-1,d))age--;
  return age;
}
function birthdayCard(b){
  const days=daysUntil(b.mmdd);
  const pc=days===0?'today':days<=14?'soon':'later';
  const pt=days===0?'🎉 Today!':days===1?'Tomorrow':`${days} days`;
  const[m,d]=b.mmdd.split('-').map(Number);
  const dateStr=new Date(2000,m-1,d).toLocaleDateString('en-GB',{day:'numeric',month:'long'});
  const initials=b.name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
  const age=calcAge(b.year,b.mmdd);
  const ageStr=age!==null?(days===0?`is ${age} today`:`turns ${age+1}`):'';
  return `<div class="birthday-item">
<div class="b-avatar">${initials}</div>
<div class="b-info"><div class="b-name">${escHtml(b.name)}</div><div class="b-date">${dateStr}${ageStr?` · ${ageStr}`:''}</div></div>
<span class="pill days-pill ${pc}">${pt}</span>
<button class="del-btn" onclick="deleteBirthday('${b.id}')">✕</button>
</div>`;
}
function renderBirthdays(){
  const mc=el('main-content');
  const sorted=[...data.birthdays].sort((a,b)=>daysUntil(a.mmdd)-daysUntil(b.mmdd));
  const upcoming=sorted.filter(b=>daysUntil(b.mmdd)<=28);
  const rest=sorted.filter(b=>daysUntil(b.mmdd)>28);
  mc.innerHTML=`

<div class="section-title">${upcoming.length?'All birthdays':'Birthdays'}</div>
<div class="card">
${rest.length===0&&upcoming.length===0?`<div class="empty-state">No birthdays added yet.</div>`:''}

function setupJournalEditor(){
  const editor=el('journal-editor');
  if(!editor)return;
  editor.addEventListener('keydown',function(ev){
    if(ev.key==='Enter'){
      ev.preventDefault();
      document.execCommand('insertHTML','false','\n');
    }
  });
  editor.addEventListener('input',function(){
    // Re-render lines with bullets, preserving plain text content
    const text=editor.innerText;
    const lines=text.split('\n');
    const html=lines.map((line,i)=>{
      const color=RAINBOW_COLORS[i%RAINBOW_COLORS.length];
      return `<div class="journal-line"><span class="j-dot" style="background:${color}"></span><span>${escHtml(line)}</span></div>`;
    }).join('');
    if(editor.innerHTML!==html){
      // Save caret position roughly (place at end after re-render — simplest reliable approach)
      editor.innerHTML=html;
      placeCaretAtEnd(editor);
    }
  });
}
function placeCaretAtEnd(el){
  el.focus();
  const range=document.createRange();
  range.selectNodeContents(el);
  range.collapse(false);
  const sel=window.getSelection();
  sel.removeAllRanges();
  sel.addRange(range);
}
function saveJournal(){

function drawWeightChartInner(entries){
  const canvas=el('weight-chart');if(!canvas)return;

  const cs=getComputedStyle(document.documentElement);
  const accent=cs.getPropertyValue('--module-color').trim()||'#7c6af7';

  const border=cs.getPropertyValue('--border').trim()||'#2d2d4e';

    const h=data.weight.heightCm/100;
    const bands=[

      {label:'Healthy',min:18.5,max:25,color:'rgba(74,222,128,0.08)'},

      {label:'Obese',min:30,color:'rgba(248,113,113,0.08)'}
    ];
    bands.forEach(b=>{
      const maxKg=b.max?b.max*h*h:Math.max(...vals)*1.1;
      datasets.push({label:b.label,data:Array(vals.length).fill(maxKg),borderColor:'transparent',backgroundColor:b.color,fill:b.min?'-1':'origin',pointRadius:0,tension:0});
    });
  }
  weightChart=new Chart(canvas,{type:'line',data:{labels,datasets},options:{responsive:true,plugins:{legend:{labels:{color:muted,font:{size:10},filter:i=>!['Underweight','Healthy','Overweight','Obese'].includes(i.text)}}},scales:{x:{ticks:{color:muted,font:{size:10}},grid:{color:border}},y:{ticks:{color:muted,font:{size:10}},grid:{color:border}}}}});
}

// PHOTO REVIEW
const PR_IMG_EXT=['jpg','jpeg','png','gif','heic','heif','webp','bmp','tiff','tif'];
const PR_VID_EXT=['mp4','mov','avi','mkv','3gp','m4v','wmv'];
const PR_REJECT_FOLDER='/Pictures/PhillsAdmin PicReview';
function prExt(name){return (name.split('.').pop()||'').toLowerCase();}
function prIsImage(name){return PR_IMG_EXT.includes(prExt(name));}
function prIsVideo(name){return PR_VID_EXT.includes(prExt(name));}
function prFmtSize(bytes){if(!bytes&&bytes!==0)return'';const mb=bytes/1048576;return mb>=1?mb.toFixed(1)+' MB':(bytes/1024).toFixed(0)+' KB';}
function prIsWifi(){const c=navigator.connection||navigator.mozConnection||navigator.webkitConnection;if(c&&c.type)return c.type==='wifi';return null;}
function prMediaEntries(){return prState.entries.filter(e=>e['.tag']==='file');}
function prBreadcrumbs(path){
  if(!path)return[{label:'Dropbox',path:''}];
  const parts=path.split('/').filter(Boolean);const crumbs=[{label:'Dropbox',path:''}];let cur='';
  parts.forEach(p=>{cur+='/'+p;crumbs.push({label:p,path:cur});});
  return crumbs;
}
function renderPhotoReviewTab(){
  if(prState.path===null)prListFolder(localStorage.getItem('pr_last_folder')||'/Pictures - Newer');
  else renderPhotoReview();
}
function renderPhotoReview(){
  if(prState.view==='viewer')renderPRViewer();
  else if(prState.view==='compare')renderPRCompare();
  else if(prState.view==='rejected')renderPRRejected();
  else renderPRBrowse();
}
async function prListFolder(path){
  prState.loading=true;prState.view='browse';prState.debugMsg=null;renderPhotoReview();
  try{
    const res=await fetch('https://api.dropboxapi.com/2/files/list_folder',{method:'POST',headers:{'Authorization':`Bearer ${accessToken}`,'Content-Type':'application/json'},body:JSON.stringify({path,recursive:false,include_media_info:false})});
    if(!res.ok){const errBody=await res.text();throw new Error(errBody);}
    const json=await res.json();
    let entries=json.entries||[];let cursor=json.cursor,hasMore=json.has_more;
    while(hasMore){
      const r2=await fetch('https://api.dropboxapi.com/2/files/list_folder/continue',{method:'POST',headers:{'Authorization':`Bearer ${accessToken}`,'Content-Type':'application/json'},body:JSON.stringify({cursor})});
      const j2=await r2.json();entries=entries.concat(j2.entries||[]);cursor=j2.cursor;hasMore=j2.has_more;
    }
    const rawCount=entries.length;
    entries=entries.filter(e=>e['.tag']==='folder'||(e['.tag']==='file'&&(prIsImage(e.name)||prIsVideo(e.name))));
    if(rawCount>0&&entries.length===0){
      const sampleNames=(json.entries||[]).slice(0,3).map(x=>x.name).join(', ');
      prState.debugMsg=`Dropbox returned ${rawCount} item(s) for "${path}", but 0 matched known photo/video types. Sample names: ${sampleNames}`;
    }else if(rawCount===0){
      prState.debugMsg=`Dropbox returned 0 items for "${path}" (folder exists but is empty, or path is wrong).`;
    }
    entries.sort((a,b)=>a['.tag']!==b['.tag']?(a['.tag']==='folder'?-1:1):a.name.localeCompare(b.name));
    prState.entries=entries;prState.path=path;localStorage.setItem('pr_last_folder',path);
  }catch(e){
    console.error('Photo Review list_folder error:',e);
    let msg=e&&e.message?e.message:String(e);
    try{const parsed=JSON.parse(msg);if(parsed.error_summary)msg=parsed.error_summary;}catch(_){}
    prState.debugMsg=`Error loading "${path}": ${msg}`;
    prState.entries=[];prState.path=path;
  }
  prState.loading=false;renderPhotoReview();
}
function prCopyDebug(){
  if(!prState.debugMsg)return;
  if(navigator.clipboard&&navigator.clipboard.writeText)navigator.clipboard.writeText(prState.debugMsg).then(()=>showToast('Copied ✓')).catch(()=>showToast('Could not copy'));
  else showToast('Clipboard not available — select text manually');
}
function prDismissDebug(){prState.debugMsg=null;renderPhotoReview();}
async function prGetThumb(path){
  if(prState.thumbCache[path])return prState.thumbCache[path];
  try{
    const res=await fetch('https://content.dropboxapi.com/2/files/get_thumbnail_v2',{method:'POST',headers:{'Authorization':`Bearer ${accessToken}`,'Content-Type':'application/json'},body:JSON.stringify({resource:{'.tag':'path',path},format:'jpeg',size:'w128h128',mode:'strict'})});
    if(!res.ok)throw new Error('no thumb');
    const blob=await res.blob();const url=URL.createObjectURL(blob);prState.thumbCache[path]=url;return url;
  }catch(e){return null;}
}
function prHydrateThumbs(){
  document.querySelectorAll('.pr-need-thumb').forEach(node=>{
    const path=node.getAttribute('data-path');
    prGetThumb(path).then(url=>{
      if(!node.isConnected)return;
      node.innerHTML=url?`<img src="${url}" />`:`<div class="pr-thumb-placeholder">🖼️</div>`;
    });
  });
}
async function prGetTempLink(path){
  try{
    const res=await fetch('https://api.dropboxapi.com/2/files/get_temporary_link',{method:'POST',headers:{'Authorization':`Bearer ${accessToken}`,'Content-Type':'application/json'},body:JSON.stringify({path})});
    const json=await res.json();return json.link||null;
  }catch(e){return null;}
}
function renderPRBrowse(){
  const mc=el('main-content');
  const folders=prState.entries.filter(e=>e['.tag']==='folder');
  const media=prMediaEntries();
  const crumbs=prBreadcrumbs(prState.path);
  mc.innerHTML=`
<div class="pr-shortcuts">
<button class="pr-shortcut-btn" onclick="prListFolder('/Pictures - Newer')">📁 Pictures - Newer</button>
<button class="pr-shortcut-btn" onclick="prListFolder('/Pictures - Older')">📁 Pictures - Older</button>
<button class="pr-shortcut-btn" onclick="prListFolder('')">🏠 Dropbox root</button>
<button class="pr-shortcut-btn" onclick="prState.view='rejected';renderPhotoReview()">🚫 Review folder (${data.photoReview.rejected.length})</button>
</div>
<div class="pr-crumbs">${crumbs.map((c,i)=>`<span class="pr-crumb" onclick="prListFolder('${escHtml(c.path)}')">${escHtml(c.label)}</span>${i<crumbs.length-1?'<span>/</span>':''}`).join('')}</div>
${prState.debugMsg?`<div class="pr-debug-banner"><div>${escHtml(prState.debugMsg)}</div><div class="pr-debug-actions"><button class="add-btn secondary" onclick="prCopyDebug()">📋 Copy</button><button class="add-btn secondary" onclick="prDismissDebug()">✕ Dismiss</button></div></div>`:''}
${prState.loading?`<div class="empty-state">Loading…</div>`:''}
${!prState.loading&&folders.length===0&&media.length===0?`<div class="empty-state">No folders or photos here.</div>`:''}
${folders.length?`<div class="card">${folders.map(f=>`<div class="pr-folder-row" onclick="prListFolder('${escHtml(f.path_lower)}')"><span class="pr-folder-icon">📁</span><span>${escHtml(f.name)}</span></div>`).join('')}</div>`:''}
${media.length?`<div class="pr-grid">${media.map((m,i)=>`
<div class="pr-thumb" onclick="prOpenViewer(${i})">
<div class="pr-need-thumb" data-path="${escHtml(m.path_lower)}"><div class="pr-thumb-placeholder">${prIsVideo(m.name)?'🎬':'🖼️'}</div></div>
${prIsVideo(m.name)?`<div class="pr-vid-badge">🎬 ${prFmtSize(m.size)}</div>`:''}
</div>`).join('')}</div>`:''}`;
  prHydrateThumbs();
}
function prOpenViewer(idx){prState.openIdx=idx;prState.view='viewer';prState.fullUrl=null;renderPhotoReview();}
function prCloseViewer(){prState.view='browse';prState.openIdx=-1;prState.fullUrl=null;renderPhotoReview();}
function prNav(delta){
  const media=prMediaEntries();const i=prState.openIdx+delta;
  if(i<0||i>=media.length)return;
  prState.openIdx=i;prState.fullUrl=null;renderPRViewer();
}
function renderPRViewer(){
  const media=prMediaEntries();const item=media[prState.openIdx];
  if(!item){prCloseViewer();return;}
  const isVid=prIsVideo(item.name);
  const mc=el('main-content');
  mc.innerHTML=`
<div class="pr-viewer">
<div class="pr-toolbar"><button class="add-btn secondary" onclick="prCloseViewer()">← Back</button><div style="flex:1;font-size:0.78rem;color:var(--muted);text-align:right;word-break:break-word">${escHtml(item.name)}</div></div>
<div class="pr-viewer-stage">
${prState.fullUrl?(isVid?`<video src="${prState.fullUrl}" controls autoplay playsinline style="max-width:100%;max-height:70vh"></video>`:`<img src="${prState.fullUrl}" style="max-width:100%;max-height:70vh" />`):`
<div class="pr-need-thumb" data-path="${escHtml(item.path_lower)}" style="position:absolute;inset:0"><div class="pr-thumb-placeholder">${isVid?'🎬':'🖼️'}</div></div>
<div class="pr-load-overlay">${isVid?`<button class="pr-play-btn" onclick="prLoadFull()">▶</button><div>${prFmtSize(item.size)}</div>`:`<button class="add-btn" onclick="prLoadFull()">📥 Load full-res photo</button><div style="font-size:0.7rem">${prFmtSize(item.size)}</div>`}</div>`}
</div>
<div class="pr-viewer-controls">
<button class="pr-nav-btn" onclick="prNav(-1)" ${prState.openIdx<=0?'disabled':''}>‹</button>
<div class="pr-action-row">
<button class="add-btn secondary" onclick="prToggleCompareSel('${item.id}')">${prState.compareSel.includes(item.id)?'✓ Selected':'⚖ Compare'}</button>
<button class="add-btn danger" onclick="prReject()">🚫 Reject</button>
</div>
<button class="pr-nav-btn" onclick="prNav(1)" ${prState.openIdx>=media.length-1?'disabled':''}>›</button>
</div>
${prState.compareSel.length===2?`<button class="add-btn" style="width:100%" onclick="prOpenCompare()">⚖ Compare selected (2)</button>`:''}
<div class="pr-filmstrip">${media.map((m,i)=>`<div class="pr-film-thumb${i===prState.openIdx?' active':''} pr-need-thumb" data-path="${escHtml(m.path_lower)}" onclick="prOpenViewer(${i})"></div>`).join('')}</div>
</div>`;
  prHydrateThumbs();
  if(!prState.fullUrl&&!isVid&&prIsWifi()===true)prLoadFull();
}
async function prLoadFull(){
  const media=prMediaEntries();const item=media[prState.openIdx];if(!item)return;
  showToast('Loading…');
  const url=await prGetTempLink(item.path_lower);
  if(url){prState.fullUrl=url;renderPRViewer();}else showToast('Could not load full-res');
}
async function prReject(){
  const media=prMediaEntries();const item=media[prState.openIdx];if(!item)return;
  if(!confirm(`Reject "${item.name}"? It'll be moved to the review folder and can be restored later.`))return;
  const dest=`${PR_REJECT_FOLDER}/${item.name}`;
  try{
    const res=await fetch('https://api.dropboxapi.com/2/files/move_v2',{method:'POST',headers:{'Authorization':`Bearer ${accessToken}`,'Content-Type':'application/json'},body:JSON.stringify({from_path:item.path_lower,to_path:dest,autorename:true})});
    const json=await res.json();
    const newPath=json.metadata?json.metadata.path_lower:dest.toLowerCase();
    data.photoReview.rejected.push({id:uid(),name:item.name,originalPath:item.path_lower,rejectedPath:newPath,rejectedAt:realToday()});
    saveToDropbox();showToast('Moved to review folder ✓');
    prState.entries=prState.entries.filter(e=>e.id!==item.id);
    prState.compareSel=prState.compareSel.filter(id=>id!==item.id);
    const newMedia=prMediaEntries();
    if(newMedia.length===0){prCloseViewer();}else{prState.openIdx=Math.min(prState.openIdx,newMedia.length-1);prState.fullUrl=null;renderPRViewer();}
  }catch(e){showToast('Could not move file');}
}
function prToggleCompareSel(id){
  const i=prState.compareSel.indexOf(id);
  if(i>=0)prState.compareSel.splice(i,1);
  else{if(prState.compareSel.length>=2)prState.compareSel.shift();prState.compareSel.push(id);}
  renderPRViewer();
}
function prOpenCompare(){if(prState.compareSel.length!==2)return;prState.view='compare';renderPhotoReview();}
function renderPRCompare(){
  const media=prMediaEntries();
  const items=prState.compareSel.map(id=>media.find(m=>m.id===id)).filter(Boolean);
  if(items.length!==2){prState.view='viewer';renderPRViewer();return;}
  const mc=el('main-content');
  mc.innerHTML=`<div class="pr-toolbar"><button class="add-btn secondary" onclick="prState.view='viewer';renderPhotoReview()">← Back to photo</button></div>
<div id="pr-compare-area" class="empty-state">Loading both photos…</div>`;
  prLoadCompareImages(items);
}
async function prLoadCompareImages(items){
  const urls=await Promise.all(items.map(it=>prGetTempLink(it.path_lower)));
  const area=el('pr-compare-area');if(!area)return;
  if(urls.includes(null)){area.textContent='Could not load one or both photos.';return;}
  const dims=await Promise.all(urls.map(u=>new Promise(res=>{const img=new Image();img.onload=()=>res({w:img.naturalWidth,h:img.naturalHeight});img.onerror=()=>res({w:1,h:1});img.src=u;})));
  const portrait=dims[0].h>dims[0].w;
  area.outerHTML=`<div class="pr-compare-wrap${portrait?' stacked':''}" id="pr-compare-area">${urls.map(u=>`<div class="pr-compare-pane"><img src="${u}" /></div>`).join('')}</div>`;
}
function renderPRRejected(){
  const mc=el('main-content');
  const list=[...data.photoReview.rejected].sort((a,b)=>b.rejectedAt.localeCompare(a.rejectedAt));
  mc.innerHTML=`<div class="pr-toolbar"><button class="add-btn secondary" onclick="prState.view='browse';renderPhotoReview()">← Back</button></div>
<div class="card">
${list.length===0?`<div class="empty-state">No rejected photos.</div>`:''}
${list.map(r=>`<div class="pr-rejected-item"><div style="flex:1"><div class="pr-rejected-name">${escHtml(r.name)}</div><div class="pr-rejected-path">${escHtml(r.originalPath)}</div></div><button class="add-btn secondary" onclick="prRestore('${r.id}')">↺ Restore</button></div>`).join('')}
</div>`;
}
async function prRestore(id){
  const r=data.photoReview.rejected.find(x=>x.id===id);if(!r)return;
  try{
    await fetch('https://api.dropboxapi.com/2/files/move_v2',{method:'POST',headers:{'Authorization':`Bearer ${accessToken}`,'Content-Type':'application/json'},body:JSON.stringify({from_path:r.rejectedPath,to_path:r.originalPath,autorename:true})});
    data.photoReview.rejected=data.photoReview.rejected.filter(x=>x.id!==id);
    saveToDropbox();showToast('Restored ✓');renderPRRejected();
  }catch(e){showToast('Could not restore — original location may no longer exist');}
}

function showApp(){

// INIT
async function init(){
  let token=handleOAuthCallback();
  if(!token)token=localStorage.getItem('dbx_token');
  if(!token){el('auth-screen').classList.add('visible');return;}
  accessToken=token;
  const cached=localStorage.getItem('dbx_cache');
  if(cached)try{
    const p=JSON.parse(cached);
    ['tasks','birthdays','journal','watchlist','shopping'].forEach(k=>{if(p[k])data[k]=p[k];});
    if(p.statements)data.statements=p.statements;
    if(p.weight)data.weight={...data.weight,...p.weight};
    if(p.photoReview)data.photoReview=p.photoReview;
    if(p.settings)data.settings={...data.settings,...p.settings};
  }catch(e){}
  const bioOn=data.settings.bioEnabled||localStorage.getItem('bio_enabled')==='1';
  if(bioOn&&window.PublicKeyCredential){
    el('bio-screen').classList.add('visible');
    setTimeout(()=>doBiometric(),300);
  }else{
    showApp();
  }
}
init();
